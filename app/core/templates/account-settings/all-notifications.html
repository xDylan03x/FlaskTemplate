{% from 'account-settings/macros.html' import notification_list %}
{% if not htmx %}
    {% extends 'account-settings/base.html' %}
    {% block settings_content %}

        <form id="notification-search-form"
              class="mb-6 flex gap-4 items-center w-full sm:justify-between"
              hx-get="{{ url_for('core.all_notifications') }}"
              hx-target="#results"
              hx-trigger="keyup changed delay:250ms from: query">

            <label class="input grow">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-4 text-base-content/50">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/>
                </svg>
                <input id="query" type="search" class="grow" name="query" accesskey="k" placeholder="Search notifications" value="{{ request.args.get('query', '') }}">
            </label>
        </form>

        <div id="results">
            {{ notification_list(notifications) }}
        </div>

    {% endblock %}
{% else %}
    {{ notification_list(notifications) }}
{% endif %}
