{% extends 'base.html' %}
{% block content %}

    <div class="flex flex-col justify-center items-center">
        <h1 class="title text-base-content text-center">400</h1>
        <p class="subtitle text-base-content/80 text-center">The server can or will not process the request.</p>
        {% if error %}
            <div class="mt-8 w-full">
                <div class="mockup-code w-full">
                    <pre><code>{{ error }}</code></pre>
                </div>
            </div>
        {% endif %}
    </div>

{% endblock %}
