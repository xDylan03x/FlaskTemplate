{% extends 'catalog-base.html' %}
{% block catalog_content %}
    <div class="container mx-auto max-w-4xl">
        <article>
            {% if article.breadcrumbs %}
                <div class="breadcrumbs text-sm">
                    <ul>
                        {% for crumb in article.breadcrumbs %}
                            <li>
                                <a href="{{ crumb.url }}" {% if crumb.active %}class="text-base-content/60"{% endif %}>{{ crumb.label }}</a>
                            </li>
                        {% endfor %}
                    </ul>
                </div>
            {% endif %}
            <h1 class="h1 mt-8">{{ article.title }}</h1>
            <p class="subtitle">{{ article.description }}</p>
            <div class="divider"></div>
            <div class="prose max-w-none mt-4">
                {{ article.html_content|safe }}
            </div>
        </article>
    </div>
{% endblock %}
